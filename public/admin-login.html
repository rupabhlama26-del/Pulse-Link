<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Admin Login | PulseLink</title>
    <script>
      (function () {
        if (window.location.protocol !== "file:") return;
        const appPath = window.location.pathname.replace(/^.*\/public/, "") || "/admin-login.html";
        const nextUrl = `http://localhost:4500${appPath}${window.location.search}${window.location.hash}`;
        window.location.replace(nextUrl);
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body class="page-shell min-h-screen bg-slate-950 text-white">
    <main class="mx-auto max-w-5xl px-6 py-14">
      <div class="grid gap-8 lg:grid-cols-[0.9fr_1.1fr]">
        <section class="glass-card p-8">
          <p class="section-label">Admin Access</p>
          <h1 class="mt-3 text-4xl font-black">System Command Center</h1>
          <p class="mt-4 text-slate-300">
            Login as administrator to manage users, monitor requests, review analytics, and send alerts.
          </p>
          <div class="mt-8 space-y-4 text-sm text-slate-300">
            <div class="mini-info-card">Admin-only secure login</div>
            <div class="mini-info-card">No public registration for admin accounts</div>
            <div class="mini-info-card">Use demo admin: rupabh@pulselink.com / password123</div>
          </div>
        </section>

        <section class="glass-card p-8">
          <h2 class="mb-6 text-2xl font-bold">Admin Login</h2>
          <form id="adminLoginForm" class="space-y-4" method="post" action="javascript:void(0);">
            <input class="input-field" type="email" name="email" placeholder="Admin Email" required />
            <input class="input-field" type="password" name="password" placeholder="Password" required />
            <button class="primary-btn w-full" type="submit">Login as Admin</button>
          </form>
          <div id="adminAuthMessage" class="mt-5 rounded-2xl border border-red-400/20 bg-red-500/10 px-4 py-3 text-sm text-red-100 hidden"></div>
        </section>
      </div>
    </main>
    <script src="./assets/js/app.js?v=12"></script>
    <script src="./assets/js/admin-login.js?v=13"></script>
  </body>
</html>
